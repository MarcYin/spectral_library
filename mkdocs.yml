site_name: spectral-library
site_description: Prepared spectral-library mapping, reconstruction, and official sensor examples.
site_url: https://marcyin.github.io/spectral_library/
repo_url: https://github.com/MarcYin/spectral_library
repo_name: MarcYin/spectral_library
docs_dir: docs
site_dir: build/docs-site
use_directory_urls: false
edit_uri: edit/main/docs/
exclude_docs: |
  github-actions.md
  metadata_only_actual_links.md
  remaining_suspicious_repair_plan.md
  remaining_suspicious_source_review_20260315.md
  scale_factor_verification.md
  specchio_access.md
  vegetation_library_candidates.md
hooks:
  - docs/mkdocs_hooks.py
theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - toc.follow
nav:
  - Home: index.md
  - Start Here:
      - Getting Started: mapping_quickstart.md
      - Official Sensor Examples: official_sensor_examples.md
  - Concepts:
      - Mathematical Foundations: theory.md
      - Prepared Runtime Contract: prepared_runtime_contract.md
      - Example Bundle: example_bundle.md
  - Reference:
      - CLI Reference: cli_reference.md
      - Python API Reference: python_api_reference.md
  - Project:
      - Security and Provenance: security_provenance.md
      - Release Process: release_process.md
      - Release Notes:
          - "0.2.1": releases/0.2.1.md
          - "0.2.0": releases/0.2.0.md
          - "0.1.0": releases/0.1.0.md
  - Internal:
      - Internal Docs Overview: internal_overview.md
      - Internal Build Pipeline: internal_build_pipeline.md
      - Mapping Design: spectral_mapping_usage_plan.md
      - Release Design: production_release_standard_plan.md
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
extra_css:
  - assets/mkdocs-extra.css
extra_javascript:
  - assets/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
