name: Full Library Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      FULL_LIBRARY_PREPARED_ROOT: ${{ vars.FULL_LIBRARY_PREPARED_ROOT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Skip when no prepared runtime is configured
        if: ${{ env.FULL_LIBRARY_PREPARED_ROOT == '' }}
        run: |
          echo "FULL_LIBRARY_PREPARED_ROOT is not configured; skipping full-library benchmark run."
          echo "Configure repository variable FULL_LIBRARY_PREPARED_ROOT to enable this workflow." >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate configured runtime path
        if: ${{ env.FULL_LIBRARY_PREPARED_ROOT != '' }}
        run: |
          test -d "${FULL_LIBRARY_PREPARED_ROOT}"

      - name: Run full-library benchmark suite
        if: ${{ env.FULL_LIBRARY_PREPARED_ROOT != '' }}
        run: |
          PYTHONPATH=src python scripts/run_full_library_benchmarks.py \
            --prepared-root "${FULL_LIBRARY_PREPARED_ROOT}" \
            --neighbor-estimator simplex_mixture \
            --knn-backend numpy \
            --k 10 \
            --max-test-rows 512 \
            --output-root build/full-library-benchmarks \
            --thresholds benchmarks/default_thresholds.json \
            --fail-on-thresholds

      - name: Upload benchmark artifacts
        if: ${{ env.FULL_LIBRARY_PREPARED_ROOT != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: full-library-benchmarks
          path: build/full-library-benchmarks
