name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  pip-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        audit-target: ["runtime", "docs"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Export dependency requirements
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          base = list(data["project"]["dependencies"])
          extras = data["project"]["optional-dependencies"]
          target = "${{ matrix.audit-target }}"
          selected = base if target == "runtime" else base + list(extras["docs"])
          output_root = Path("build")
          output_root.mkdir(exist_ok=True)
          output_path = output_root / f"{target}-audit-requirements.txt"
          output_path.write_text("\n".join(selected) + "\n", encoding="utf-8")
          print(f"Wrote {output_path}")
          PY

      - name: Audit dependencies
        run: |
          pip-audit \
            --strict \
            --desc on \
            --progress-spinner off \
            -r "build/${{ matrix.audit-target }}-audit-requirements.txt"
