name: Package Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

  build-and-smoke:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python scripts/build_distribution.py

      - name: Upload package artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-dist
          path: dist/*

      - name: Create smoke fixture
        run: python scripts/create_mapping_smoke_fixture.py --output-root "${RUNNER_TEMP}/mapping-smoke"

      - name: Install wheel in clean environment
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$(find dist -name '*.whl' -print -quit)"

      - name: Run package smoke checks
        run: |
          . .venv-smoke/bin/activate
          python - <<'PY'
          import numpy as np
          import spectral_library

          expected = {
              "BandInput",
              "BatchMappingArrayResult",
              "BatchMappingResult",
              "HyperspectralLibraryInput",
              "LinearSpectralMapper",
              "MappingResult",
              "PreparedRuntime",
              "PreparedLibraryManifest",
              "SensorInput",
              "SensorSRFSchema",
              "SpectralMapper",
              "benchmark_mapping",
              "build_mapping_library",
              "build_mapping_runtime",
              "coerce_sensor_input",
              "prepare_mapping_library",
              "validate_prepared_library",
          }
          missing = sorted(expected - set(spectral_library.__all__))
          if missing:
              raise SystemExit(f"Missing public exports: {missing}")

          schema = spectral_library.coerce_sensor_input(
              spectral_library.SensorInput(
                  bands=[
                      spectral_library.BandInput(center_wavelength_nm=550.0, fwhm_nm=20.0),
                      spectral_library.BandInput(center_wavelength_nm=1600.0, fwhm_nm=20.0),
                  ]
              )
          )
          if schema.band_ids() != ("band_1", "band_2"):
              raise SystemExit(f"Unexpected normalized band ids: {schema.band_ids()}")

          wavelengths = np.arange(400.0, 2501.0, 1.0, dtype=np.float64)
          spectra = np.vstack(
              [
                  np.full(wavelengths.shape, 0.1, dtype=np.float32),
                  np.full(wavelengths.shape, 0.2, dtype=np.float32),
              ]
          )
          with spectral_library.build_mapping_runtime(
              library=spectral_library.HyperspectralLibraryInput(
                  wavelengths_nm=wavelengths,
                  spectra=spectra,
                  sample_ids=["sample_a", "sample_b"],
              ),
              source_sensors=[
                  spectral_library.SensorInput(
                      sensor_id="source_sensor",
                      bands=[
                          spectral_library.BandInput(
                              band_id="blue",
                              center_wavelength_nm=490.0,
                              fwhm_nm=20.0,
                          ),
                      ],
                  )
              ],
              target_sensors=[
                  spectral_library.SensorInput(
                      sensor_id="target_sensor",
                      bands=[
                          spectral_library.BandInput(
                              band_id="green",
                              center_wavelength_nm=560.0,
                              fwhm_nm=20.0,
                          ),
                      ],
                  )
              ],
          ) as runtime:
              result = runtime.map_reflectance(
                  source_sensor="source_sensor",
                  reflectance={"blue": 0.15},
                  output_mode="target_sensor",
                  target_sensor="target_sensor",
              )
              if result.target_band_ids != ("green",):
                  raise SystemExit(f"Unexpected target bands: {result.target_band_ids}")
          PY
          spectral-library --help >/dev/null
          spectral-library-internal --help >/dev/null
          spectral-library prepare-mapping-library --help >/dev/null
          spectral-library build-mapping-library \
            --siac-root "${RUNNER_TEMP}/mapping-smoke/siac" \
            --srf-root "${RUNNER_TEMP}/mapping-smoke/srfs" \
            --source-sensor sensor_a \
            --output-root "${RUNNER_TEMP}/mapping-smoke/prepared"
          spectral-library validate-prepared-library \
            --prepared-root "${RUNNER_TEMP}/mapping-smoke/prepared"
          spectral-library map-reflectance \
            --prepared-root "${RUNNER_TEMP}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --target-sensor sensor_b \
            --input "${RUNNER_TEMP}/mapping-smoke/query_single.csv" \
            --output-mode target_sensor \
            --k 1 \
            --output "${RUNNER_TEMP}/mapping-smoke/mapped.csv"
          spectral-library map-reflectance-batch \
            --prepared-root "${RUNNER_TEMP}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --target-sensor sensor_b \
            --input "${RUNNER_TEMP}/mapping-smoke/query_batch.csv" \
            --output-mode target_sensor \
            --k 1 \
            --output "${RUNNER_TEMP}/mapping-smoke/mapped_batch.csv" \
            --diagnostics-output "${RUNNER_TEMP}/mapping-smoke/mapped_batch_diagnostics.json"

  docs-site:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install docs build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build docs site
        run: python -m mkdocs build --clean --config-file mkdocs.yml --site-dir build/docs-site

      - name: Upload docs site preview
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-site-preview
          path: build/docs-site

  optional-knn-smoke:
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: scipy_ckdtree
            extra: knn
            persist_backend: ""
            knn_eps: "0.05"
          - backend: faiss
            extra: knn-faiss
            persist_backend: faiss
            knn_eps: "0.10"
          - backend: pynndescent
            extra: knn-pynndescent
            persist_backend: pynndescent
            knn_eps: "0.10"
          - backend: scann
            extra: knn-scann
            persist_backend: scann
            knn_eps: "0.10"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install backend-specific dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[${{ matrix.extra }}]"

      - name: Create smoke fixture
        run: python scripts/create_mapping_smoke_fixture.py --output-root "${RUNNER_TEMP}/mapping-smoke"

      - name: Prepare runtime with optional ANN indexes
        run: |
          extra_args=""
          if [ -n "${{ matrix.persist_backend }}" ]; then
            extra_args="--knn-index-backend ${{ matrix.persist_backend }}"
          fi
          spectral-library prepare-mapping-library --help >/dev/null
          spectral-library build-mapping-library \
            --siac-root "${RUNNER_TEMP}/mapping-smoke/siac" \
            --srf-root "${RUNNER_TEMP}/mapping-smoke/srfs" \
            --source-sensor sensor_a \
            --source-sensor sensor_b \
            --output-root "${RUNNER_TEMP}/mapping-smoke/prepared" \
            ${extra_args}

      - name: Run ANN smoke mapping and benchmark
        run: |
          spectral-library map-reflectance \
            --prepared-root "${RUNNER_TEMP}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --target-sensor sensor_b \
            --input "${RUNNER_TEMP}/mapping-smoke/query_single.csv" \
            --output-mode target_sensor \
            --k 2 \
            --knn-backend "${{ matrix.backend }}" \
            --knn-eps "${{ matrix.knn_eps }}" \
            --output "${RUNNER_TEMP}/mapping-smoke/ann_mapped.csv"
          spectral-library benchmark-mapping \
            --prepared-root "${RUNNER_TEMP}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --target-sensor sensor_b \
            --neighbor-estimator simplex_mixture \
            --knn-backend "${{ matrix.backend }}" \
            --knn-eps "${{ matrix.knn_eps }}" \
            --report "${RUNNER_TEMP}/mapping-smoke/ann_benchmark.json"
          PYTHONPATH=src python scripts/run_full_library_benchmarks.py \
            --prepared-root "${RUNNER_TEMP}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --source-sensor sensor_b \
            --neighbor-estimator simplex_mixture \
            --knn-backend numpy \
            --knn-backend "${{ matrix.backend }}" \
            --k 2 \
            --max-test-rows 2 \
            --output-root "${RUNNER_TEMP}/mapping-smoke/ann_qualification" \
            --thresholds benchmarks/smoke_thresholds.json \
            --fail-on-thresholds
