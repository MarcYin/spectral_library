name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: x86_64
          - os: ubuntu-latest
            cibw_archs: aarch64
          - os: macos-latest
            cibw_archs: x86_64 arm64
          - os: windows-latest
            cibw_archs: AMD64
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up QEMU for aarch64
        if: matrix.cibw_archs == 'aarch64'
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3
        with:
          platforms: arm64

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@d4a2945fcc8d13f20a1b99571e8f986571d6b31b # v2.23.3
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: dist/*.tar.gz

  collect-dist:
    needs:
      - build-wheels
      - build-sdist
    runs-on: ubuntu-latest
    outputs:
      wheel_path: ${{ steps.dist-paths.outputs.wheel_path }}
      sdist_path: ${{ steps.dist-paths.outputs.sdist_path }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: all-artifacts

      - name: Collect all distribution files
        run: |
          mkdir -p dist
          find all-artifacts -name '*.whl' -exec cp {} dist/ \;
          find all-artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          ls -la dist/

      - name: Resolve distribution paths
        id: dist-paths
        run: |
          wheel_path="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          sdist_path="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "${wheel_path}"
          test -n "${sdist_path}"
          echo "wheel_path=${wheel_path}" >> "${GITHUB_OUTPUT}"
          echo "sdist_path=${sdist_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload combined release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dist
          path: dist/*

  smoke:
    needs: collect-dist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-type: wheel
          - os: ubuntu-latest
            artifact-type: sdist
          - os: macos-latest
            artifact-type: wheel
          - os: windows-latest
            artifact-type: wheel
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: matrix.artifact-type == 'sdist'

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist

      - name: Create smoke fixture
        run: python scripts/create_mapping_smoke_fixture.py --output-root "${{ runner.temp }}/mapping-smoke"

      - name: Install artifact in clean environment (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv-release-smoke
          . .venv-release-smoke/bin/activate
          python -m pip install --upgrade pip
          if [ "${{ matrix.artifact-type }}" = "wheel" ]; then
            python -m pip install "$(find dist -name '*.whl' -print -quit)"
          else
            python -m pip install "$(find dist -name '*.tar.gz' -print -quit)"
          fi

      - name: Install artifact in clean environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .venv-release-smoke
          .\.venv-release-smoke\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          if ("${{ matrix.artifact-type }}" -eq "wheel") {
            $whl = Get-ChildItem dist -Filter '*.whl' | Select-Object -First 1
            python -m pip install $whl.FullName
          } else {
            $sdist = Get-ChildItem dist -Filter '*.tar.gz' | Select-Object -First 1
            python -m pip install $sdist.FullName
          }

      - name: Run release smoke workflow (Unix)
        if: runner.os != 'Windows'
        run: |
          . .venv-release-smoke/bin/activate
          python - <<'PY'
          import spectral_library
          import spectral_library as sl

          expected = {
              "BatchMappingArrayResult",
              "BatchMappingResult",
              "LinearSpectralMapper",
              "MappingResult",
              "PreparedLibraryManifest",
              "SensorSRFSchema",
              "SpectralMapper",
              "benchmark_mapping",
              "prepare_mapping_library",
              "validate_prepared_library",
          }
          missing = sorted(expected - set(sl.__all__))
          if missing:
              raise SystemExit(f"Missing public exports: {missing}")
          PY
          spectral-library --help >/dev/null
          spectral-library-internal --help >/dev/null
          spectral-library prepare-mapping-library \
            --siac-root "${{ runner.temp }}/mapping-smoke/siac" \
            --srf-root "${{ runner.temp }}/mapping-smoke/srfs" \
            --source-sensor sensor_a \
            --output-root "${{ runner.temp }}/mapping-smoke/prepared"
          spectral-library validate-prepared-library \
            --prepared-root "${{ runner.temp }}/mapping-smoke/prepared"
          spectral-library map-reflectance \
            --prepared-root "${{ runner.temp }}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --target-sensor sensor_b \
            --input "${{ runner.temp }}/mapping-smoke/query_single.csv" \
            --output-mode target_sensor \
            --k 1 \
            --output "${{ runner.temp }}/mapping-smoke/mapped.csv"
          spectral-library map-reflectance-batch \
            --prepared-root "${{ runner.temp }}/mapping-smoke/prepared" \
            --source-sensor sensor_a \
            --target-sensor sensor_b \
            --input "${{ runner.temp }}/mapping-smoke/query_batch.csv" \
            --output-mode target_sensor \
            --k 1 \
            --output "${{ runner.temp }}/mapping-smoke/mapped_batch.csv" \
            --diagnostics-output "${{ runner.temp }}/mapping-smoke/mapped_batch_diagnostics.json"

      - name: Run release smoke workflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\.venv-release-smoke\Scripts\Activate.ps1
          python -c @"
          import spectral_library as sl
          expected = {
              'BatchMappingArrayResult', 'BatchMappingResult', 'LinearSpectralMapper',
              'MappingResult', 'PreparedLibraryManifest', 'SensorSRFSchema',
              'SpectralMapper', 'benchmark_mapping', 'prepare_mapping_library',
              'validate_prepared_library',
          }
          missing = sorted(expected - set(sl.__all__))
          if missing:
              raise SystemExit(f'Missing public exports: {missing}')
          "@
          spectral-library --help | Out-Null
          spectral-library prepare-mapping-library `
            --siac-root "${{ runner.temp }}/mapping-smoke/siac" `
            --srf-root "${{ runner.temp }}/mapping-smoke/srfs" `
            --source-sensor sensor_a `
            --output-root "${{ runner.temp }}/mapping-smoke/prepared"
          spectral-library validate-prepared-library `
            --prepared-root "${{ runner.temp }}/mapping-smoke/prepared"
          spectral-library map-reflectance `
            --prepared-root "${{ runner.temp }}/mapping-smoke/prepared" `
            --source-sensor sensor_a `
            --target-sensor sensor_b `
            --input "${{ runner.temp }}/mapping-smoke/query_single.csv" `
            --output-mode target_sensor `
            --k 1 `
            --output "${{ runner.temp }}/mapping-smoke/mapped.csv"

  attest-release-artifacts:
    needs:
      - collect-dist
      - smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/*

  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: attest-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist

      - name: Prepare PyPI upload directory
        run: |
          mkdir -p upload-dist
          cp dist/*.whl upload-dist/
          cp dist/*.tar.gz upload-dist/

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: upload-dist/

  publish-github-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: attest-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist

      - name: Resolve release notes path
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_path="docs/releases/${version}.md"
          test -f "${notes_path}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "notes_path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: dist/*
          name: spectral-library ${{ steps.notes.outputs.version }}
