[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "spectral-library"
version = "0.1.0"
description = "Spectral library build, preparation, and retrieval-based mapping toolkit."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "duckdb>=1.1.0",
  "matplotlib>=3.8.0",
  "netCDF4>=1.7.0",
  "numpy>=1.24.0",
  "openpyxl>=3.1.0",
  "pandas>=2.0.0",
  "rdata>=0.11.0",
  "whitsmooth-rust>=0.1.3",
]

[project.scripts]
spectral-library = "spectral_library.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
spectral_library = ["py.typed"]
